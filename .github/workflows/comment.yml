name: TikTok Auto Comment

on:
  schedule:
    # 3x daily: 10am, 2pm, 7pm UTC
    - cron: "0 10 * * *"
    - cron: "0 14 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  comment:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Write TikTok cookies
        env:
          TIKTOK_COOKIES: ${{ secrets.TIKTOK_COOKIES }}
        run: echo "$TIKTOK_COOKIES" > tiktok_cookies.json

      - name: Run TikTok commenter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TIKTOK_HEADLESS: "1"
        run: python main.py --comment 8
